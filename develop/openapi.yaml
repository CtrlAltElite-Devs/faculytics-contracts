openapi: 3.0.0
paths:
  /api/v1/health:
    get:
      operationId: HealthController_GetServerHealth_v1
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: string
      tags:
        - Health
  /api/v1/auth/login:
    post:
      operationId: AuthController_Login_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
      tags:
        - Auth
  /api/v1/auth/me:
    get:
      operationId: AuthController_me_v1
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
      security:
        - accesstoken: []
      tags:
        - Auth
  /api/v1/auth/refresh:
    post:
      operationId: AuthController_Refresh_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequestBody'
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
      tags:
        - Auth
  /api/v1/auth/logout:
    post:
      operationId: AuthController_Logout_v1
      parameters: []
      responses:
        '201':
          description: ''
      security:
        - accesstoken: []
      tags:
        - Auth
  /api/v1/chatkit:
    post:
      operationId: ChatKitController_Handle_v1
      parameters: []
      responses:
        '201':
          description: ''
      security:
        - accesstoken: []
      tags:
        - ChatKit
  /api/v1/enrollments/me:
    get:
      operationId: EnrollmentsController_getMyEnrollments_v1
      parameters:
        - name: page
          required: true
          in: query
          schema:
            type: number
        - name: limit
          required: true
          in: query
          schema:
            type: number
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyEnrollmentsResponseDto'
      security:
        - accesstoken: []
      summary: Get current user's enrolled courses
      tags:
        - enrollments
  /api/v1/questionnaires/types:
    get:
      operationId: QuestionnaireController_getQuestionnaireTypes_v1
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QuestionnaireTypeResponse'
      summary: List all questionnaire types
      tags:
        - Questionnaires
  /api/v1/questionnaires/types/{type}/versions:
    get:
      operationId: QuestionnaireController_getVersionsByType_v1
      parameters:
        - name: type
          required: true
          in: path
          schema:
            type: string
            enum:
              - FACULTY_IN_CLASSROOM
              - FACULTY_OUT_OF_CLASSROOM
              - FACULTY_FEEDBACK
      responses:
        '200':
          description: Versions found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionnaireVersionsResponse'
      summary: Get versions for a questionnaire type
      tags:
        - Questionnaires
  /api/v1/questionnaires:
    post:
      operationId: QuestionnaireController_createQuestionnaire_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuestionnaireRequest'
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Questionnaire'
      summary: Create a new questionnaire
      tags:
        - Questionnaires
  /api/v1/questionnaires/{id}/versions:
    post:
      operationId: QuestionnaireController_createVersion_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVersionRequest'
      responses:
        '201':
          description: Version created successfully
        '404':
          description: Questionnaire not found
        '409':
          description: Draft version already exists
      summary: Create a new version for a questionnaire
      tags:
        - Questionnaires
  /api/v1/questionnaires/{id}/latest-active-version:
    get:
      operationId: QuestionnaireController_getLatestActiveVersion_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Active version found or null if none exists
        '404':
          description: Questionnaire not found
      summary: Get the latest active version for a questionnaire
      tags:
        - Questionnaires
  /api/v1/questionnaires/versions/{versionId}/publish:
    patch:
      operationId: QuestionnaireController_publishVersion_v1
      parameters:
        - name: versionId
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Version published successfully
        '400':
          description: Version already published or invalid schema
        '404':
          description: Version not found
      summary: Publish a questionnaire version
      tags:
        - Questionnaires
  /api/v1/questionnaires/versions/{versionId}/deprecate:
    patch:
      operationId: QuestionnaireController_deprecateVersion_v1
      parameters:
        - name: versionId
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Version deprecated successfully
        '400':
          description: Version already deprecated
        '404':
          description: Version not found
      summary: Deprecate a questionnaire version
      tags:
        - Questionnaires
  /api/v1/questionnaires/submissions:
    post:
      operationId: QuestionnaireController_submitQuestionnaire_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitQuestionnaireRequest'
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionnaireSubmission'
      security:
        - accesstoken: []
      summary: Submit a completed questionnaire
      tags:
        - Questionnaires
  /api/v1/questionnaires/drafts:
    post:
      operationId: QuestionnaireController_saveDraft_v1
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveDraftRequest'
      responses:
        '201':
          description: Draft saved successfully
        '400':
          description: Invalid data or inactive version
        '404':
          description: Resource not found
      security:
        - accesstoken: []
      summary: Save or update a draft questionnaire
      tags:
        - Questionnaires
    get:
      operationId: QuestionnaireController_getDraft_v1
      parameters:
        - name: versionId
          required: true
          in: query
          schema:
            format: uuid
            type: string
        - name: facultyId
          required: true
          in: query
          schema:
            format: uuid
            type: string
        - name: semesterId
          required: true
          in: query
          schema:
            format: uuid
            type: string
        - name: courseId
          required: false
          in: query
          schema:
            format: uuid
            type: string
      responses:
        '200':
          description: Draft found or null if no draft exists for this context
      security:
        - accesstoken: []
      summary: Get a specific draft by query parameters
      tags:
        - Questionnaires
  /api/v1/questionnaires/drafts/list:
    get:
      operationId: QuestionnaireController_listMyDrafts_v1
      parameters: []
      responses:
        '200':
          description: Drafts retrieved successfully
      security:
        - accesstoken: []
      summary: List all drafts for the current user
      tags:
        - Questionnaires
  /api/v1/questionnaires/drafts/{id}:
    delete:
      operationId: QuestionnaireController_deleteDraft_v1
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Draft deleted successfully
        '404':
          description: Draft not found
      security:
        - accesstoken: []
      summary: Delete a draft by ID
      tags:
        - Questionnaires
info:
  title: Faculytics API
  description: This is the official API documentation for Faculytics
  version: '1.0'
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    accesstoken:
      scheme: bearer
      bearerFormat: JWT
      type: http
      name: Authorization
      in: header
  schemas:
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        refreshToken:
          type: string
      required:
        - token
        - refreshToken
    MeResponse:
      type: object
      properties:
        id:
          type: string
        userName:
          type: string
        moodleUserId:
          type: number
        firstName:
          type: string
        lastName:
          type: string
        userProfilePicture:
          type: string
        fullName:
          type: string
        roles:
          type: array
          items:
            type: string
        campus:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            code:
              type: string
          required:
            - id
            - code
      required:
        - id
        - userName
        - firstName
        - lastName
        - userProfilePicture
        - fullName
        - roles
    RefreshTokenRequestBody:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken
    CourseShortResponseDto:
      type: object
      properties:
        id:
          type: string
        moodleCourseId:
          type: number
        shortname:
          type: string
        fullname:
          type: string
        courseImage:
          type: string
      required:
        - id
        - moodleCourseId
        - shortname
        - fullname
    FacultyShortResponseDto:
      type: object
      properties:
        id:
          type: string
        fullName:
          type: string
        employeeNumber:
          type: string
        profilePicture:
          type: string
      required:
        - id
        - fullName
    EnrollmentResponseDto:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
        course:
          $ref: '#/components/schemas/CourseShortResponseDto'
        faculty:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/FacultyShortResponseDto'
      required:
        - id
        - role
        - course
    PaginationMeta:
      type: object
      properties:
        totalItems:
          type: number
        itemCount:
          type: number
        itemsPerPage:
          type: number
        totalPages:
          type: number
        currentPage:
          type: number
      required:
        - totalItems
        - itemCount
        - itemsPerPage
        - totalPages
        - currentPage
    MyEnrollmentsResponseDto:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/EnrollmentResponseDto'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required:
        - data
        - meta
    QuestionnaireTypeResponse:
      type: object
      properties:
        type:
          type: string
          enum:
            - FACULTY_IN_CLASSROOM
            - FACULTY_OUT_OF_CLASSROOM
            - FACULTY_FEEDBACK
        questionnaireId:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
          enum:
            - DRAFT
            - ACTIVE
            - DEPRECATED
      required:
        - type
        - questionnaireId
        - title
        - status
    QuestionnaireVersionItem:
      type: object
      properties:
        id:
          type: string
        versionNumber:
          type: number
        status:
          enum:
            - DRAFT
            - ACTIVE
            - DEPRECATED
          type: string
        isActive:
          type: boolean
        publishedAt:
          format: date-time
          type: string
          nullable: true
        createdAt:
          format: date-time
          type: string
      required:
        - id
        - versionNumber
        - status
        - isActive
        - createdAt
    QuestionnaireVersionsResponse:
      type: object
      properties:
        questionnaireId:
          type: string
          nullable: true
        questionnaireTitle:
          type: string
          nullable: true
        type:
          enum:
            - FACULTY_IN_CLASSROOM
            - FACULTY_OUT_OF_CLASSROOM
            - FACULTY_FEEDBACK
          type: string
        versions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionnaireVersionItem'
      required:
        - questionnaireId
        - questionnaireTitle
        - type
        - versions
    CreateQuestionnaireRequest:
      type: object
      properties:
        title:
          type: string
        type:
          enum:
            - FACULTY_IN_CLASSROOM
            - FACULTY_OUT_OF_CLASSROOM
            - FACULTY_FEEDBACK
          type: string
      required:
        - title
        - type
    Questionnaire:
      type: object
      properties:
        title:
          type: string
        status:
          type: string
          default: DRAFT
          enum:
            - DRAFT
            - ACTIVE
            - DEPRECATED
        type:
          type: string
          enum:
            - FACULTY_IN_CLASSROOM
            - FACULTY_OUT_OF_CLASSROOM
            - FACULTY_FEEDBACK
        versions:
          type: object
          default: []
        id:
          type: object
          default: c444a014-4991-48f7-895f-31a8b6d5a485
        createdAt:
          type: object
          default: '2026-03-11T03:16:57.075Z'
        updatedAt:
          type: object
          default: '2026-03-11T03:16:57.075Z'
        deletedAt:
          type: object
      required:
        - title
        - status
        - type
        - versions
        - id
        - createdAt
        - updatedAt
    CreateVersionRequest:
      type: object
      properties:
        schema:
          type: object
      required:
        - schema
    SubmitQuestionnaireRequest:
      type: object
      properties:
        versionId:
          type: string
          format: uuid
        respondentId:
          type: string
          format: uuid
        facultyId:
          type: string
          format: uuid
        semesterId:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        answers:
          type: object
